# ── Proxmox PoC API endpoints → api.fridrdev.uk (Cloudflare Tunnel) ──────────
[[redirects]]
  from = "/api/status"
  to = "https://api.fridrdev.uk/status"
  status = 200
  force = true

[[redirects]]
  from = "/api/migrate/*"
  to = "https://api.fridrdev.uk/migrate/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/ping"
  to = "https://api.fridrdev.uk/ping"
  status = 200
  force = true

[[redirects]]
  from = "/api/latency"
  to = "https://api.fridrdev.uk/latency"
  status = 200
  force = true

# ── VRT project — all other /api/* → AWS API Gateway ─────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://oku2jon40l.execute-api.eu-west-3.amazonaws.com/:splat"
  status = 200
  force = true
